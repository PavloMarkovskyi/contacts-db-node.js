type: object
properties:
  status:
    type: integer
    example: 200
  message:
    type: string
    example: Successfully logged in via Google OAuth!
  data:
    type: object
    properties:
      accessToken:
        type: string
        description: JWT access token
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
