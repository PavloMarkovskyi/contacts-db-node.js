type: object
properties:
  name:
    type: string
    description: Name of the contact
  email:
    type: string
    format: email
    description: Email of the contact
  phoneNumber:
    type: string
    description: Phone number of the contact
  contactType:
    type: string
    enum: [work, home, personal]
    description: Type of the contact
  isFavourite:
    type: boolean
    description: Indicates if the contact is a favourite
  photo:
    type: string
    format: binary
    description: Photo of the contact (file upload)
required:
  - name
  - phoneNumber
  - contactType
