type: object
properties:
  name:
    type: string
    description: Name of the contact
  email:
    type: string
    description: Email of the contact
  phone:
    type: string
    description: Phone number of the contact
  contactType:
    type: string
    description: Type of the contact (personal, work, etc.)
  isFavourite:
    type: boolean
    description: Indicates if the contact is a favourite
required:
  - name
  - email
  - phone
